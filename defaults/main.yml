---
# Upgrade mode: none | safe | full
#   none — не апгрейдить ничего (только установка новых пакетов)
#   safe — apt upgrade (security/bugfix БЕЗ ядра/firmware) — 1-3 мин
#   full — apt upgrade full / dist-upgrade (всё, включая ядро) — 10-30 мин
packages_upgrade_mode: none

# Async settings for upgrade tasks (safe and full).
# Avoids the "ansible hangs silently" issue while linux-firmware/kernel
# packages download for many minutes.
# Total wait limit in seconds (1800 = 30 min) and poll interval in seconds.
packages_full_upgrade_async_timeout: 1800
packages_full_upgrade_async_poll: 30

packages_install_common:
  - iptables-persistent
  - netfilter-persistent
  - git
  - bind9-host
  - net-tools
  - auditd
  - audispd-plugins
  - htop
  - duf
  - jq
  - curl
  - vim
  - wget
  - unzip
  - ca-certificates
  - gnupg
  - ncdu
  - plocate
  - tree
  - lshw

packages_install_extra: []

packages_remove: []

packages_update_cache: true

packages_cache_valid_time: 3600

packages_repositories: []

## yq YAML processor
## Installed from apt if available, otherwise from GitHub releases
packages_yq_install: true
packages_yq_version: "v4.44.3"
